name : Terraform template
on : 
  workflow_call:
    secrets:
      api_key:
        required: true
    inputs:
      environment:
        required: true
        type: string
permissions:
  id-token: write   # Required to request the JWT from GitHub
  contents: read    # Required to checkout the code

jobs:
  terraform:
    runs-on: ubuntu-latest
    name : "Run Terraform ${{ inputs.environment }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::607079772680:role/my-github-actions-role
          aws-region: ap-south-1

      - name: "Set up Terraform"
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "1.15.0"

      - name: "Terraform Init"
        run: terraform init
        working-directory: environments/${{ inputs.environment }}

      - name: "Terraform Plan"
        run: terraform plan
        working-directory: ./environments/${{ inputs.environment }}

      - name: "Terraform Apply"
        run: terraform apply -auto-approve
        working-directory: ./environments/${{ inputs.environment }}
